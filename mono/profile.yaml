bio: |
  Atuo em formação na área de Segurança da Informação, com interesse no desenvolvimento de práticas que integrem proteção de dados, análise de vulnerabilidades e consciência organizacional. Minha trajetória combina estudo contínuo, curiosidade por tecnologia e sensibilidade humana, orientando minha forma de compreender riscos e construir soluções.

  Tenho interesse amplo por tecnologia e busco constantemente aprender sobre diferentes áreas da TI, explorando desde fundamentos até novas ferramentas e tendências.

  Sou natural de Brasília e, aos 16 anos, me mudei para a Bahia, em Ilhéus. Anos depois, decidi sair em busca de crescimento profissional e artístico, estabelecendo-me no Rio Grande do Sul, onde reconstruí minha trajetória conciliando trabalho e formação.

  No campo artístico, desenvolvo minha carreira como ator, com formação construída ao longo de anos de estudo e prática. Integrei a companhia Teatro Luz & Cena, experiência que fortaleceu minha presença cênica e consolidou a arte como parte essencial da minha identidade. Posteriormente, segui para São Paulo, onde tive contato com a Arte Longa e o Quilombo Auracária, filosofias que ampliaram minha visão sobre criação, coletividade e propósito, influenciando diretamente minha forma de pensar e atuar tanto na arte quanto na vida profissional.

  Foi a partir de experiências reais com vulnerabilidades e golpes que encontrei na cibersegurança um novo propósito. Hoje, compreendo a segurança da informação não apenas como um campo técnico, mas como uma forma de proteger pessoas, relações e histórias. Acredito na integração entre áreas humanas e tecnológicas como um diferencial essencial para o presente e o futuro.
servicos:
