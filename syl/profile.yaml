bio: >-
  Syl é formada em Ciências Biológicas, com foco em Ciências Ambientais, e construiu uma trajetória que integra ciência,
  arte e sociedade. Especializou-se em Fisiologia do Exercício enquanto dirigia a Cia de Dança Âmar, dedicada às danças
  árabes.


  Ao longo de sua carreira, desenvolveu atuação em comunicação científica e engajamento público, trabalhando com
  diferentes formatos de divulgação e construção de narrativas acessíveis para aproximar a ciência da sociedade.


  Durante a pandemia, atuou como voluntária em testagem de COVID-19 e, em seguida, concluiu mestrado em genética. Nesse
  período, viveu de forma nômade pelo Brasil, buscando uma vida mais simples e conectada à natureza, incluindo dois anos
  em Ubatuba, onde aprofundou sua relação com o território e o meio ambiente.


  Atualmente, é doutoranda na área de ética e inovação social, investigando formas de aplicar a ciência com impacto
  social. Também é professora de yoga, integrando práticas de mindfulness e consciência corporal às suas atividades.


  Nos intervalos, dedica-se ao desenho botânico e à meditação.
servicos:
  - Comunicação Científica
  - Yoga
  - Desenho Botânico
  - Dança e Expressão Corporal
  - Meditação
  - Autocuidado
