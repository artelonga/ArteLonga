<style>
/* ───────────── AZ1+2 — EDITORIAL-LAB (mistura de AZ1 e AZ2) ─────────────
   Display em serif (Fraunces, do AZ1) + metadados em mono (Space Mono, do AZ2).
   Pareamento clássico: título/leitura literários, datas e rótulos técnicos.
   Só tipografia; layout vem de zigzag.css. */
:root {
  --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  --mono: 'Space Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
.neuro-head h1 { font-family: var(--serif); font-weight: 600; letter-spacing: -0.02em; }

/* metadados → mono (AZ2) */
.card .yr {
  font-family: var(--mono); font-weight: 700; font-size: 1.45rem; line-height: 1;
  letter-spacing: -0.02em; text-transform: none; color: var(--ink);
}
.card .yr::before { content: "› "; color: var(--ink-3); }
.card.open .yr, .card.open .yr::before { color: var(--terra); }
.card .more { font-family: var(--mono); }
.al-list { font-family: var(--mono); font-size: 0.8rem; }
.al-fig figcaption { font-family: var(--mono); font-size: 0.68rem; }

/* display + leitura → serif (AZ1) */
.card h3 { font-family: var(--serif); font-weight: 600; font-size: 1.3rem; line-height: 1.14;
           letter-spacing: 0; margin-top: 0.3rem; }
.card .teaser { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 1.02rem;
                color: var(--ink-2); }
.card .body { font-family: var(--serif); font-size: 1rem; line-height: 1.5; }
</style>
</head>
