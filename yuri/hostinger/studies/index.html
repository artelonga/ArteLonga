<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Studies — Data Analyst @ Hostinger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#161413; --ink2:#5b5450; --ink3:#6f6760; --line:#e7e1da; --bg:#fbf9f6; --bg2:#fff;
    --accent:#9a3b2e; --host:#673de6; --host2:#5b34cc; --mono:'Space Mono',ui-monospace,monospace; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .wrap{max-width:820px;margin:0 auto;padding:0 1.2rem 4rem}
  .bar{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;padding:1rem 0 .6rem;font-family:var(--mono);font-size:.78rem;
    border-bottom:1px solid var(--line);margin-bottom:1.6rem}
  .bar .back{text-decoration:none;color:var(--ink2)}
  .bar .back:hover{color:var(--ink)}
  .bar .sp{flex:1}
  .bar a.t{text-decoration:none;color:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:.25rem .7rem}
  .bar a.t:hover{border-color:var(--ink3);color:var(--ink)}
  .bar a.t.on{background:var(--host);color:#fff;border-color:var(--host)}

  /* rendered markdown */
  .md h1{font-family:var(--mono);font-size:1.55rem;line-height:1.25;font-weight:700;margin:.2rem 0 1rem;letter-spacing:-.01em}
  .md h2{font-family:var(--mono);font-size:1.18rem;font-weight:700;margin:2rem 0 .5rem;letter-spacing:-.01em;
    padding-top:1rem;border-top:1px solid var(--line)}
  .md h3{font-family:var(--mono);font-size:1rem;font-weight:700;margin:1.4rem 0 .4rem}
  .md h4{font-family:var(--mono);font-size:.9rem;font-weight:700;margin:1.1rem 0 .3rem;color:var(--ink2)}
  .md p{margin:.6rem 0;font-size:.95rem}
  .md ul,.md ol{margin:.6rem 0 .6rem 1.4rem;font-size:.95rem}
  .md li{margin:.25rem 0}
  .md a{color:var(--accent);text-decoration:none}
  .md a:hover{text-decoration:underline}
  .md strong{color:var(--ink)}
  .md blockquote{margin:1rem 0;padding:.6rem 1rem;border-left:3px solid var(--host);background:var(--bg2);
    border-radius:0 8px 8px 0;color:var(--ink2);font-size:.92rem}
  .md blockquote p:first-child{margin-top:0}
  .md blockquote p:last-child{margin-bottom:0}
  .md hr{border:0;border-top:1px solid var(--line);margin:1.8rem 0}
  .md code{font-family:var(--mono);font-size:.86em;background:var(--bg2);border:1px solid var(--line);
    border-radius:4px;padding:.05rem .35rem}
  .md pre{font-family:var(--mono);font-size:.82rem;line-height:1.5;background:var(--bg2);border:1px solid var(--line);
    border-radius:10px;padding:1rem 1.1rem;overflow-x:auto;margin:1rem 0}
  .md pre code{background:none;border:0;padding:0;font-size:1em;white-space:pre}
  .md table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.85rem;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line);padding:.45rem .65rem;text-align:left;vertical-align:top}
  .md th{font-family:var(--mono);background:var(--bg2);font-weight:700;font-size:.82rem}
  .md img{max-width:100%}
  .note{font-family:var(--mono);font-size:.8rem;color:var(--ink3);margin-top:.4rem}
  .err{font-family:var(--mono);font-size:.9rem;color:var(--accent);padding:2rem 0}
  .foot{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--line);font-family:var(--mono);font-size:.74rem;color:var(--ink3)}
  .foot a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <a class="back" href="/yuri/hostinger/">← application</a>
    <span class="sp"></span>
    <a class="t" data-doc="funnel-study" href="?doc=funnel-study">Funnel &amp; insights</a>
    <a class="t" data-doc="dns-hostinger-findings" href="?doc=dns-hostinger-findings">DNS findings</a>
    <a class="t" data-doc="hostinger-api-reference" href="?doc=hostinger-api-reference">API reference</a>
  </div>

  <article class="md" id="doc"><p class="note">Loading study…</p></article>

  <p class="foot">Yuri Y. Vieira Sugano · studies for the Data Analyst application · <a href="/yuri/hostinger/">back to the application</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
  "use strict";
  var ALLOWED = { "funnel-study":1, "dns-hostinger-findings":1, "hostinger-api-reference":1 };
  var params = new URLSearchParams(location.search);
  var doc = params.get("doc");
  if (!ALLOWED[doc]) doc = "funnel-study";

  // highlight active nav tab
  var tabs = document.querySelectorAll(".bar a.t");
  for (var i=0;i<tabs.length;i++){ if (tabs[i].getAttribute("data-doc")===doc) tabs[i].classList.add("on"); }

  var target = document.getElementById("doc");

  function render(){
    fetch("./" + doc + ".md")
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
      .then(function(md){
        if (window.marked && typeof window.marked.parse === "function") {
          target.innerHTML = window.marked.parse(md);
        } else if (typeof window.marked === "function") {
          target.innerHTML = window.marked(md);
        } else {
          throw new Error("marked not loaded");
        }
        document.title = (target.querySelector("h1") ? target.querySelector("h1").textContent : doc) + " — studies";
      })
      .catch(function(e){
        target.innerHTML = '<p class="err">Could not load this study (' + (e && e.message ? e.message : e) + ').</p>';
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();
</script>
<script src="/yuri/feedback.js?v=20260602f" defer></script>
</body>
</html>
