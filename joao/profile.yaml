bio: >-
  Psicólogo clínico com abordagem em psicanálise e psicologia junguiana, atuando no atendimento de crianças,
  adolescentes, adultos, idosos e casais. É pós-graduado em Psicologia Social e Ciências Humanas, desenvolvendo um
  trabalho fundamentado na escuta clínica, com foco na elaboração do sofrimento psíquico, no fortalecimento da autonomia
  e na promoção do bem-estar mental.


  Possui experiência no acolhimento de pessoas em situação de vulnerabilidade social e dependência química, além de
  integrar o grupo de masculinidades da Fecaf. Realiza atendimentos nas modalidades online e presencial.
