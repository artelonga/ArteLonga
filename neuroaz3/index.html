/* ───────────── AZ3 — DISPLAY (grotesk Space Grotesk) ─────────────
   Só tipografia/expressão; layout vem de zigzag.css. Datas enormes e punchy,
   tracking apertado, contraste alto. Tudo na mesma grotesk pra coesão. */
:root { --grotesk: 'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
body, .neuro-head h1, .card .teaser, .card .body { font-family: var(--grotesk); }
.neuro-head h1 { font-weight: 700; letter-spacing: -0.04em; }
.card .yr {
  font-family: var(--grotesk); font-weight: 700; font-size: 2.15rem; line-height: 0.95;
  letter-spacing: -0.05em; text-transform: none; color: var(--ink);
}
.card.open .yr { color: var(--terra); }
.card h3 { font-family: var(--grotesk); font-weight: 700; font-size: 1.16rem; line-height: 1.12;
           letter-spacing: -0.025em; margin-top: 0.15rem; }
.card .teaser { font-size: 0.88rem; font-weight: 400; }
.card .more { font-weight: 700; }
/* conector um pouco mais baixo, pra alinhar com a data gigante */
.card::before, .card::after { top: 1.7rem; }
.card::after { top: calc(1.7rem - 5px); }
</style>
