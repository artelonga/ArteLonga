<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Longa</title>
    <link rel="stylesheet" href="/assets/site.css">
    <style>
        .statement {
            font-size: clamp(2.2rem, 4.5vw, 4.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 4vh;
        }

        .roster {
            list-style: none;
            max-width: 760px;
        }

        .roster li {
            padding: 1.3vh 0;
            position: relative;
        }

        .roster li::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, #ddd 30%, transparent);
        }

        .roster li:last-child::after { display: none; }

        .roster li.section-break {
            margin-top: 3vh;
            padding-top: 3vh;
            position: relative;
        }
        .roster li.section-break::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 2px;
            background: #0a0a0a;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .roster a.name {
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            font-weight: 700;
            color: #0a0a0a;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .roster a.name:hover { opacity: 0.45; }

        .roster li.muted a.name {
            color: #c5c5c5;
            font-style: italic;
            font-weight: 500;
        }
        .roster li.muted .role {
            color: #d5d5d5;
            font-style: italic;
        }

        .role {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #aaa;
            user-select: none;
            cursor: pointer;
            padding: 0.5em 0 0.5em 0.8em;
        }

        .card {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
        }

        .roster li:hover .card,
        .roster li.open .card {
            max-height: 900px;
            opacity: 1;
        }

        .card-inner {
            display: flex;
            gap: 2rem;
            padding: 1.6vh 0.2rem 0.8vh;
            align-items: flex-start;
        }

        .card-left {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            align-items: flex-start;
        }

        .profile-block {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .avatar-sm {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #f2f2f2;
            color: #a0a0a0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 300;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-bio {
            font-size: 0.82rem;
            color: #777;
            line-height: 1.55;
            padding-top: 0.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-bio.empty {
            color: #c8c8c8;
            font-style: italic;
        }

        .card-right {
            flex-shrink: 0;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.9rem;
        }

        .card-missoes {
            list-style: none;
        }

        .card-missoes li {
            font-size: 0.78rem;
            color: #777;
            letter-spacing: 0.02em;
            padding: 0.22em 0;
        }

        .card-missoes li::before {
            content: "· ";
            color: #bbb;
        }

        .card-membros {
            list-style: none;
            min-width: 240px;
            width: 100%;
        }
        .mini-row {
            display: block;
            padding: 0.45em 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .mini-row:last-child { border-bottom: none; }
        .mini-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            transition: opacity 0.2s;
            display: inline-block;
        }
        .mini-name:hover { opacity: 0.5; }
        .mini-drawer {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s;
        }
        .mini-row:hover .mini-drawer,
        .mini-row.open .mini-drawer {
            max-height: 220px;
            opacity: 1;
        }
        .mini-missoes {
            list-style: none;
            padding: 0.35em 0 0.15em 1em;
        }
        .mini-missoes li {
            font-size: 0.72rem;
            color: #888;
            padding: 0.15em 0;
            letter-spacing: 0.02em;
        }
        .mini-missoes li::before { content: "· "; color: #ccc; }

        .see-more {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #0a0a0a;
            text-decoration: none;
            border: 1px solid #0a0a0a;
            padding: 0.55em 1em;
            transition: background 0.2s, color 0.2s;
        }

        .see-more:hover {
            background: #0a0a0a;
            color: #fff;
        }

        .coda {
            margin-top: 5vh;
            max-width: 760px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .coda p {
            font-size: 0.8rem;
            color: #999;
            line-height: 1.7;
        }

        .coda a {
            color: #0a0a0a;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .coda a:hover { opacity: 0.45; }

        .coda .when {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: #ccc;
        }

        .veil {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            flex-direction: column;
        }

        .veil.on { opacity: 1; pointer-events: all; }

        .veil span {
            color: #fff;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        .veil small {
            display: block;
            color: #444;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 2rem;
        }

        @media (max-width: 720px) {
            .card-inner { flex-direction: column; gap: 1.2rem; }
            .card-right { text-align: left; align-items: flex-start; }
            .roster li:hover .card,
            .roster li.open .card { max-height: 480px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img src="/logo-al.png" alt="Arte Longa">
            </a>
            <span class="site-tagline">semeando sonhos</span>
        </div>
    </header>

    <main class="main">
        <h1 class="statement">Arte Longa é:</h1>

        <ul class="roster" id="roster"></ul>

        <div class="coda">
            <span class="when">01.04.2026</span>
        </div>
    </main>

    <div class="veil" id="v">
        <span>em breve</span>
        <small>abril 2026</small>
    </div>

    <script>
        // Roster data — source of truth is /membros/*.md + /missoes/*.md + /comunidades/*.md.
        // Re-sync by hand when those files change.
        const data = [
            { handle: "yuri",   nome: "Yuri",   role: "Sementes",    bio: "",
              missoes: ["Escrita, Interpretação e Tradução", "Ensino, Formação e Liderança", "Inteligência e Tecnologia", "Gestão Executiva"] },
            { handle: "igo",    nome: "Igo",    role: "Resistência", bio: "",
              missoes: ["Gestão Operacional", "Rede de parcerias"] },
            { handle: "jose",   nome: "José",   role: "Recursos",    bio: "",
              missoes: ["Gestão administrativa", "Gestão financeira"] },
            { handle: "mono",   nome: "Mono",   role: "Segurança",   bio: "",
              missoes: ["Consultoria em TI", "Privacidade e segurança digital"] },
            { handle: "bruna",  nome: "Bruna",  role: "Comunicação",
              bio: "Sou uma pessoa prática, criativa e muito orientada a resolver problemas. Minha trajetória começou com produção de eventos, até chegar no nicho da comédia stand-up, sempre curiosa sobre tudo, aprendi diversas áreas da produção e também da comunicação, o que me deu jogo de cintura e a capacidade de me conectar com diferentes públicos de forma leve e autêntica.",
              pic: "/bruna/bruna.jpeg",
              missoes: ["Comunicação visual", "Criação de conteúdo", "Marketing digital"],
              membros: [
                  { handle: "alicia", nome: "Alicia", missoes: ["Futuro", "Filha da Bruna"] }
              ] },
            { handle: "luck",   nome: "Luck",   role: "Experiência", bio: "",
              missoes: ["Design", "Experiência de usuário (UI/UX)"] },
            { handle: "karina", nome: "Karina", role: "Visão",       bio: "",
              pic: "/karina/karina.jpeg",
              missoes: ["Fotografia"] },
            { handle: "marina", nome: "Marina", role: "Cuidado",     bio: "",
              missoes: ["Acompanhamento nutricional", "Alfabetização", "Cuidado com o idoso", "Reforço escolar"] },
            { handle: "kayra",  nome: "Kayra",  role: "Expressão",   bio: "",
              pic: "/kayra/kayra.jpg",
              missoes: ["Modelo", "Consultoria em Moda", "Rede de Talentos"] },
            { handle: "aime",   nome: "Aime",   role: "em breve",    bio: "", muted: true, missoes: [],
              membros: [
                  { handle: "john", nome: "John", missoes: ["Futuro", "Filho da Aime"] }
              ] },
            { handle: "sylvia", nome: "Sylvia", role: "Consciência", bio: "",
              missoes: ["Meditação", "Autocuidado"] },
            { handle: "raquel", nome: "Raquel", role: "Presença",    bio: "",
              missoes: ["Saúde Mental", "Terapia Comportamental", "Autocuidado"] },
            { handle: "rogerio", nome: "Rogério", role: "Xeramoi",   bio: "",
              missoes: ["Mentoria Espiritual", "Resistência dos Povos Originários"] },
            { handle: "alzira", nome: "Alzira", role: "Xejaryi",     bio: "",
              missoes: ["Mentoria Espiritual", "Resistência dos Povos Originários"] },
            { handle: "quilomboaraucaria", nome: "Quilombo Araucária", role: "Terra", bio: "",
              sectionBreak: true,
              tipo: "comunidade",
              externalUrl: "https://quilomboaraucaria.org",
              missoes: ["Desenvolvimento sustentável", "Raízes do futuro", "Resistência dos Povos Originários"],
              membros: [
                  { handle: "antony", nome: "Antony", missoes: ["Produção Musical"] },
                  { handle: "bia",    nome: "Bia",    missoes: [] },
                  { handle: "ken",    nome: "Ken",    missoes: ["Alimentação e Bebidas"] },
                  { handle: "quinho", nome: "Quinho", missoes: ["Artes Visuais", "Grafite", "Murais e Fachadas"] },
                  { handle: "tiao",   nome: "Tião",   missoes: ["Drywall e Bioconstrução"] },
                  { handle: "veh",    nome: "Veh",    missoes: ["Alimentação e Bebidas", "Tortas Salgadas da Veh"] }
              ] },
            { handle: "hfsassociados", nome: "HFS Associados", role: "Transparência", bio: "Contabilidade.",
              tipo: "comunidade",
              externalUrl: "https://hfsassociados.com.br/",
              missoes: ["Gestão Contábil", "Gestão Fiscal", "Consultoria Jurídica"],
              membros: [] },
            { handle: "hedix",  nome: "Hedix",  role: "Previsão",    bio: "",
              tipo: "comunidade",
              externalUrl: "https://hedix.com.br/",
              missoes: ["Market Making Preditivo", "Inteligência de Previsão"],
              membros: [] }
        ];

        const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const initial = s => (s || "?").trim()[0].toUpperCase();

        const roster = document.getElementById("roster");
        for (const p of data) {
            const li = document.createElement("li");
            if (p.muted) li.classList.add("muted");
            if (p.sectionBreak) li.classList.add("section-break");

            const bioHtml = p.bio
                ? `<p class="card-bio">${esc(p.bio)}</p>`
                : `<p class="card-bio empty">Biografia em breve.</p>`;

            const membrosHtml = (p.membros && p.membros.length)
                ? `<ul class="card-membros">${p.membros.map(m => {
                    const miniMissoes = m.missoes && m.missoes.length
                        ? `<div class="mini-drawer"><ul class="mini-missoes">${m.missoes.map(mm => `<li>${esc(mm)}</li>`).join("")}</ul></div>`
                        : "";
                    return `<li class="mini-row">
                        <a class="mini-name" href="/${esc(m.handle)}/">${esc(m.nome)}</a>
                        ${miniMissoes}
                    </li>`;
                }).join("")}</ul>`
                : "";

            const missoesHtml = (p.missoes && p.missoes.length)
                ? `<ul class="card-missoes">${p.missoes.map(m => `<li>${esc(m)}</li>`).join("")}</ul>`
                : (p.muted ? "" : `<ul class="card-missoes"><li style="font-style:italic;color:#bbb;">em breve</li></ul>`);

            const isComunidade = p.tipo === "comunidade";
            const targetUrl = p.externalUrl || `/${esc(p.handle)}/`;
            const targetAttrs = p.externalUrl ? ` target="_blank" rel="noopener"` : "";

            const seeMore = p.muted
                ? ""
                : `<a class="see-more" href="${targetUrl}"${targetAttrs}>ver mais →</a>`;

            const nameHtml = `<a href="${targetUrl}" class="name"${targetAttrs}>${esc(p.nome)}</a>`;

            const avatarHtml = isComunidade
                ? ""
                : `<div class="avatar-sm">${p.pic ? `<img src="${esc(p.pic)}" alt="${esc(p.nome)}">` : esc(initial(p.nome))}</div>`;

            const profileBlock = isComunidade
                ? bioHtml
                : `<div class="profile-block">${avatarHtml}${bioHtml}</div>`;

            const leftContent = `${profileBlock}${membrosHtml}${seeMore}`;

            li.innerHTML = `
                <div class="row">
                    ${nameHtml}
                    <span class="role">${esc(p.role)}</span>
                </div>
                <div class="card">
                    <div class="card-inner">
                        <div class="card-left">
                            ${leftContent}
                        </div>
                        <div class="card-right">
                            ${missoesHtml}
                        </div>
                    </div>
                </div>
            `;
            roster.appendChild(li);
        }

        // "parceiros" link still shows veil (no /parceiros page yet).
        document.querySelectorAll('[data-veil]').forEach(a =>
            a.addEventListener('click', e => {
                e.preventDefault();
                document.getElementById('v').classList.add('on');
            })
        );
        document.getElementById('v').addEventListener('click', e => e.currentTarget.classList.remove('on'));
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('v').classList.remove('on');
        });

        // Tap-to-toggle on community/member row: clicking the role label toggles the card
        document.querySelectorAll('.roster > li').forEach(li => {
            const role = li.querySelector(':scope > .row > .role');
            if (!role) return;
            role.addEventListener('click', e => {
                e.stopPropagation();
                li.classList.toggle('open');
            });
        });

        // Tap-to-toggle for mini-rows (sub-members inside a community card)
        document.querySelectorAll('.mini-row').forEach(row => {
            row.addEventListener('click', e => {
                if (e.target.closest('.mini-name')) return; // name link navigates
                e.stopPropagation();
                row.classList.toggle('open');
            });
        });
    </script>

</body>
</html>
