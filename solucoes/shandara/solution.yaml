descLong: >-
  Shandara é um mundo de fantasia criado para ser a base de experiências interativas, especialmente RPGs, mas também
  pode ser usado em jogos digitais, histórias e plataformas online.


  O que torna Shandara diferente de outros mundos de fantasia é que ele é estruturado em torno de seis forças
  primordiais que regem tudo: vida, matéria, tempo, transformação e energia. Essas forças moldam não apenas o ambiente,
  mas também as culturas, criaturas e conflitos do mundo.


  O mundo é habitado por várias espécies únicas, cada uma com sua própria identidade cultural, organização social e
  conexão com as forças fundamentais. Em vez de serem apenas variações de “raças clássicas”, cada povo de Shandara tem
  sua própria história, filosofia e papel ativo nos conflitos globais.


  O cenário também é marcado por um grande evento histórico — uma guerra que dividiu o mundo e alterou o equilíbrio
  entre magia, natureza e civilização — criando um ambiente cheio de tensões políticas, mistérios antigos e
  oportunidades narrativas.


  Além disso, Shandara foi pensado desde o início como um universo modular, ou seja:


  • Pode ser usado como base para campanhas de RPG

  • Pode ser adaptado para plataformas digitais

  • Pode servir como template para criação de novas experiências


  Isso permite que ele funcione não apenas como uma história, mas como um ecossistema expansível, onde novos conteúdos,
  mecânicas e tecnologias podem ser integrados ao longo do tempo.
