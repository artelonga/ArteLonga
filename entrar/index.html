<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Arte Longa</title>
    <meta name="robots" content="noindex,nofollow">
    <script src="/assets/bootstrap.js"></script>
    <style>
        .entrar-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 4vh 0 6vh;
        }
        .entrar-h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: #0a0a0a;
            margin-bottom: 0.8vh;
        }
        .entrar-sub {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 3vh;
        }

        /* Reuse fp-form card pattern */
        .fp-form { background: #fff; border: 1px solid #e0e0e0; border-radius: 2px; padding: 4vh 2.4rem; }
        .fp-form-title {
            font-size: 0.65rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: #0a0a0a;
            font-weight: 700;
            margin-bottom: 2vh;
        }
        .fp-form-sub {
            font-size: 0.88rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 2.4vh;
        }
        .fp-field { margin-bottom: 2.4vh; }
        .fp-field label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #666;
            font-weight: 600;
            margin-bottom: 0.6vh;
        }
        .fp-field input[type="email"],
        .fp-field input[type="text"] {
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 1.2vh 0.9rem;
            border: 1px solid #d4d4d4;
            border-radius: 2px;
            background: #fff;
            color: #0a0a0a;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            box-sizing: border-box;
        }
        .fp-field input:focus {
            outline: none;
            border-color: #0a0a0a;
            box-shadow: 0 0 0 3px rgba(10,10,10,0.08);
        }
        .fp-submit {
            width: 100%;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 1.8vh 1.6rem;
            background: #0a0a0a;
            color: #fff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .fp-submit:hover { background: #c0392b; }
        .fp-submit:disabled { opacity: 0.6; cursor: default; }

        .entrar-error {
            font-size: 0.85rem;
            color: #c0392b;
            margin-top: 1.2vh;
            line-height: 1.4;
        }

        .entrar-divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 2.4vh 0;
            color: #aaa;
            font-size: 0.78rem;
        }
        .entrar-divider::before,
        .entrar-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .entrar-google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 1.4vh 1.4rem;
            background: #fff;
            border: 1px solid #d4d4d4;
            border-radius: 2px;
            cursor: pointer;
            color: #0a0a0a;
            transition: border-color 0.15s, background 0.15s;
            box-sizing: border-box;
        }
        .entrar-google-btn:hover {
            border-color: #0a0a0a;
            background: #fafafa;
        }

        .entrar-code-target { font-weight: 700; }

        .entrar-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 2vh;
            font-size: 0.82rem;
        }
        .entrar-actions button {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: #0a0a0a;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }
        .entrar-actions button:hover { color: #c0392b; }
        .entrar-actions button:disabled {
            color: #aaa;
            cursor: default;
            text-decoration: none;
        }
        .entrar-sep { color: #ccc; }

        .back {
            display: inline-block;
            margin-top: 3vh;
            padding: 0.6rem 0;
            font-size: 0.85rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #444;
            font-weight: 600;
            text-decoration: none;
        }
        .back:hover { color: #c0392b; }

        @media (max-width: 640px) {
            .entrar-wrap { padding: 3vh 0 5vh; }
            .fp-form { padding: 3vh 1.2rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img src="/logo-al.png" alt="Arte Longa" width="58" height="36">
            </a>
            <a class="site-cta-parceiros" href="/faca-parte/">Para parceiros →</a>
        </div>
    </header>

    <main class="main">
        <div class="entrar-wrap">

            <!-- Passo 1: email -->
            <div id="al-email-step">
                <h1 class="entrar-h1">Entrar<br>ou Cadastrar</h1>
                <p class="entrar-sub">Acesse sua conta ou crie uma com o seu email.</p>

                <form class="fp-form" id="al-signup" novalidate>
                    <p class="fp-form-title">Continue com seu email</p>

                    <div class="fp-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email"
                               placeholder="email@exemplo.com"
                               autocomplete="email" required>
                    </div>

                    <button type="submit" class="fp-submit">Continuar →</button>
                    <div id="al-signup-error" class="entrar-error" hidden></div>

                    <div class="entrar-divider" aria-hidden="true">ou</div>

                    <button type="button" class="entrar-google-btn" id="al-google-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Entrar com Google
                    </button>
                </form>
            </div>

            <!-- Passo 2: código -->
            <div id="al-code-step" hidden>
                <div class="fp-form">
                    <p class="fp-form-title">Verifique seu email</p>
                    <p class="fp-form-sub">
                        Enviamos um código de 6 dígitos para
                        <span class="entrar-code-target" id="al-code-target"></span>.
                    </p>

                    <form id="al-verify-form" novalidate>
                        <div class="fp-field">
                            <label for="al-code">Código</label>
                            <input type="text" id="al-code" name="code"
                                   placeholder="000000"
                                   autocomplete="one-time-code"
                                   inputmode="numeric"
                                   maxlength="6" required>
                        </div>

                        <button type="submit" id="al-verify-btn" class="fp-submit">
                            Confirmar →
                        </button>
                        <div id="al-verify-error" class="entrar-error" hidden></div>
                    </form>

                    <div class="entrar-actions">
                        <button type="button" id="al-resend" disabled>Reenviar</button>
                        <span class="entrar-sep" aria-hidden="true">·</span>
                        <button type="button" id="al-edit-email">Editar email</button>
                    </div>
                </div>
            </div>

            <a class="back" href="/">← voltar</a>
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <a href="/parceiros/">Parceiros</a>
            <span class="sep" aria-hidden="true">·</span>
            <a href="/sobre/">Sobre</a>
            <span class="sep" aria-hidden="true">·</span>
            <a href="/proximos-passos/">Próximos passos</a>
        </div>
    </footer>

    <script src="/assets/al-signup.js" defer></script>
</body>
</html>
