<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços — Arte Longa</title>
    <link rel="stylesheet" href="/assets/site.css">
    <style>
        .page-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1vh;
        }

        .page-subtitle {
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 4vh;
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3vh;
        }

        .controls input[type="search"],
        .controls select {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.7em 1em;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls input[type="search"] { flex: 1; min-width: 200px; }
        .controls input[type="search"]:focus,
        .controls select:focus { border-color: #0a0a0a; }

        .count {
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 1vh;
        }

        .servicos-list {
            list-style: none;
            border-top: 2px solid #0a0a0a;
        }

        .servicos-list li {
            padding: 1.8vh 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1.5rem;
            flex-wrap: wrap;
            cursor: pointer;
            transition: background 0.15s;
        }

        .servicos-list li:hover {
            background: #fafafa;
            padding-left: 0.4rem;
            padding-right: 0.4rem;
        }

        .servico-titulo {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0a0a0a;
            flex: 1;
            min-width: 240px;
        }

        .servico-meta {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: #888;
            text-align: right;
        }

        .servico-meta a {
            color: #0a0a0a;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .servico-meta a:hover { opacity: 0.5; }

        .servico-meta .funcao {
            display: inline-block;
            margin-left: 0.6em;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 0.16em;
            color: #aaa;
        }

        .empty-state {
            padding: 6vh 0;
            text-align: center;
            color: #bbb;
            font-style: italic;
        }

        .back {
            display: inline-block;
            margin-top: 5vh;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #999;
            text-decoration: none;
        }
        .back:hover { opacity: 0.5; }

        /* Contact modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.82);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
            padding: 4vh 6vw;
        }
        .modal-overlay.on { opacity: 1; pointer-events: all; }

        .modal-card {
            background: #fff;
            border: 2px solid #0a0a0a;
            padding: 5vh 3rem 4vh;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .modal-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 1.5rem;
        }

        .modal-servico {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 0.6rem;
            font-style: italic;
        }

        .modal-email {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #0a0a0a;
            margin: 1rem 0 2.5rem;
            user-select: all;
            word-break: break-all;
        }

        .modal-close {
            font-family: inherit;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid #0a0a0a;
            background: #fff;
            color: #0a0a0a;
            padding: 0.9em 1.6em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .modal-close:hover {
            background: #0a0a0a;
            color: #fff;
        }

        @media (max-width: 640px) {
            .servicos-list li { flex-direction: column; gap: 0.4rem; align-items: flex-start; }
            .servico-meta { text-align: left; }
            .servico-meta .funcao { margin-left: 0; display: block; margin-top: 0.3em; }
            .modal-card { padding: 4vh 2rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img src="/logo-al.png" alt="Arte Longa">
            </a>
            <span class="site-tagline">semeando sonhos</span>
        </div>
    </header>

    <main class="main">
        <h1 class="page-title">Serviços</h1>
        <div class="page-subtitle">Arte Longa · Serviços oferecidos</div>

        <div class="controls">
            <input type="search" id="search" placeholder="Buscar serviço ou responsável…" autocomplete="off">
            <select id="filter-funcao">
                <option value="">Todas as funções</option>
            </select>
            <select id="filter-responsavel">
                <option value="">Todos os responsáveis</option>
            </select>
        </div>

        <div class="count" id="count"></div>
        <ul class="servicos-list" id="servicos-list"></ul>

        <a class="back" href="/">← voltar</a>
    </main>

    <div class="modal-overlay" id="contact-modal" role="dialog" aria-modal="true" aria-labelledby="modal-label">
        <div class="modal-card">
            <div class="modal-label" id="modal-label">Contato</div>
            <div class="modal-servico" id="modal-servico"></div>
            <div class="modal-email" id="modal-email">rede@artelonga.com.br</div>
            <button class="modal-close" type="button">Fechar</button>
        </div>
    </div>

    <script>
        const REDE_EMAIL = "rede@artelonga.com.br";

        const servicos = [
            { titulo: "Acompanhamento nutricional", responsavel: [{ handle: "marina", nome: "Marina" }], funcao: "Cuidado" },
            { titulo: "Alfabetização", responsavel: [{ handle: "marina", nome: "Marina" }], funcao: "Cuidado" },
            { titulo: "Alimentação e Bebidas", responsavel: [{ handle: "veh", nome: "Veh" }, { handle: "ken", nome: "Ken" }], funcao: "" },
            { titulo: "Artes Visuais", responsavel: [{ handle: "quinho", nome: "Quinho" }], funcao: "" },
            { titulo: "Autocuidado", responsavel: [{ handle: "sylvia", nome: "Sylvia" }, { handle: "raquel", nome: "Raquel" }], funcao: "" },
            { titulo: "Comunicação visual", responsavel: [{ handle: "bruna", nome: "Bruna" }], funcao: "Comunicação" },
            { titulo: "Consultoria em Moda", responsavel: [{ handle: "kayra", nome: "Kayra" }], funcao: "Expressão" },
            { titulo: "Consultoria em TI", responsavel: [{ handle: "mono", nome: "Mono" }], funcao: "Segurança" },
            { titulo: "Consultoria Jurídica", responsavel: [{ handle: "hfsassociados", nome: "HFS Associados", url: "https://hfsassociados.com.br/" }], funcao: "Transparência", contactUrl: "https://hfsassociados.com.br/" },
            { titulo: "Criação de conteúdo", responsavel: [{ handle: "bruna", nome: "Bruna" }], funcao: "Comunicação" },
            { titulo: "Cuidado com o idoso", responsavel: [{ handle: "marina", nome: "Marina" }], funcao: "Cuidado" },
            { titulo: "Design", responsavel: [{ handle: "luck", nome: "Luck" }], funcao: "Experiência" },
            { titulo: "Desenvolvimento sustentável", responsavel: [{ handle: "quilomboaraucaria", nome: "Quilombo Araucária", url: "https://quilomboaraucaria.org" }], funcao: "Terra", contactUrl: "https://quilomboaraucaria.org" },
            { titulo: "Drywall e Bioconstrução", responsavel: [{ handle: "tiao", nome: "Tião" }], funcao: "" },
            { titulo: "Ensino, Formação e Liderança", responsavel: [{ handle: "yuri", nome: "Yuri" }], funcao: "Sementes" },
            { titulo: "Escrita, Interpretação e Tradução", responsavel: [{ handle: "yuri", nome: "Yuri" }], funcao: "Sementes" },
            { titulo: "Experiência de usuário (UI/UX)", responsavel: [{ handle: "luck", nome: "Luck" }], funcao: "Experiência" },
            { titulo: "Filha da Bruna", responsavel: [{ handle: "alicia", nome: "Alicia" }], funcao: "" },
            { titulo: "Filho da Aime", responsavel: [{ handle: "john", nome: "John" }], funcao: "" },
            { titulo: "Fotografia", responsavel: [{ handle: "karina", nome: "Karina" }], funcao: "Visão" },
            { titulo: "Futuro", responsavel: [{ handle: "alicia", nome: "Alicia" }, { handle: "john", nome: "John" }], funcao: "" },
            { titulo: "Gestão administrativa", responsavel: [{ handle: "jose", nome: "José" }], funcao: "Recursos" },
            { titulo: "Gestão Contábil", responsavel: [{ handle: "hfsassociados", nome: "HFS Associados", url: "https://hfsassociados.com.br/" }], funcao: "Transparência", contactUrl: "https://hfsassociados.com.br/" },
            { titulo: "Gestão Executiva", responsavel: [{ handle: "yuri", nome: "Yuri" }], funcao: "Sementes" },
            { titulo: "Gestão financeira", responsavel: [{ handle: "jose", nome: "José" }], funcao: "Recursos" },
            { titulo: "Gestão Fiscal", responsavel: [{ handle: "hfsassociados", nome: "HFS Associados", url: "https://hfsassociados.com.br/" }], funcao: "Transparência", contactUrl: "https://hfsassociados.com.br/" },
            { titulo: "Gestão Operacional", responsavel: [{ handle: "igo", nome: "Igo" }], funcao: "Resistência" },
            { titulo: "Grafite", responsavel: [{ handle: "quinho", nome: "Quinho" }], funcao: "" },
            { titulo: "Inteligência de Previsão", responsavel: [{ handle: "hedix", nome: "Hedix", url: "https://hedix.com.br/" }], funcao: "Previsão", contactUrl: "https://hedix.com.br/" },
            { titulo: "Inteligência e Tecnologia", responsavel: [{ handle: "yuri", nome: "Yuri" }], funcao: "Sementes" },
            { titulo: "Market Making Preditivo", responsavel: [{ handle: "hedix", nome: "Hedix", url: "https://hedix.com.br/" }], funcao: "Previsão", contactUrl: "https://hedix.com.br/" },
            { titulo: "Marketing digital", responsavel: [{ handle: "bruna", nome: "Bruna" }], funcao: "Comunicação" },
            { titulo: "Meditação", responsavel: [{ handle: "sylvia", nome: "Sylvia" }], funcao: "Consciência" },
            { titulo: "Modelo", responsavel: [{ handle: "kayra", nome: "Kayra" }], funcao: "Expressão" },
            { titulo: "Murais e Fachadas", responsavel: [{ handle: "quinho", nome: "Quinho" }], funcao: "" },
            { titulo: "Privacidade e segurança digital", responsavel: [{ handle: "mono", nome: "Mono" }], funcao: "Segurança" },
            { titulo: "Produção Musical", responsavel: [{ handle: "antony", nome: "Antony" }], funcao: "" },
            { titulo: "Raízes do futuro", responsavel: [{ handle: "quilomboaraucaria", nome: "Quilombo Araucária", url: "https://quilomboaraucaria.org" }], funcao: "Terra", contactUrl: "https://quilomboaraucaria.org" },
            { titulo: "Rede de parcerias", responsavel: [{ handle: "igo", nome: "Igo" }], funcao: "Resistência" },
            { titulo: "Rede de Talentos", responsavel: [{ handle: "kayra", nome: "Kayra" }], funcao: "Expressão" },
            { titulo: "Reforço escolar", responsavel: [{ handle: "marina", nome: "Marina" }], funcao: "Cuidado" },
            { titulo: "Saúde Mental", responsavel: [{ handle: "raquel", nome: "Raquel" }], funcao: "Presença" },
            { titulo: "Terapia Comportamental", responsavel: [{ handle: "raquel", nome: "Raquel" }], funcao: "Presença" },
            { titulo: "Tortas Salgadas da Veh", responsavel: [{ handle: "veh", nome: "Veh" }], funcao: "" }
        ];

        const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const norm = s => String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        servicos.sort((a, b) => a.titulo.localeCompare(b.titulo, "pt-BR"));

        const funcaoSet = new Set(servicos.map(s => s.funcao).filter(Boolean));
        const respMap = new Map();
        for (const s of servicos) for (const r of s.responsavel) respMap.set(r.handle, r.nome);

        const funcSelect = document.getElementById("filter-funcao");
        [...funcaoSet].sort((a, b) => a.localeCompare(b, "pt-BR")).forEach(f => {
            const opt = document.createElement("option");
            opt.value = f; opt.textContent = f;
            funcSelect.appendChild(opt);
        });

        const respSelect = document.getElementById("filter-responsavel");
        [...respMap.entries()].sort((a, b) => a[1].localeCompare(b[1], "pt-BR")).forEach(([h, n]) => {
            const opt = document.createElement("option");
            opt.value = h; opt.textContent = n;
            respSelect.appendChild(opt);
        });

        const listEl = document.getElementById("servicos-list");
        const countEl = document.getElementById("count");
        const searchEl = document.getElementById("search");
        const modal = document.getElementById("contact-modal");
        const modalServico = document.getElementById("modal-servico");
        const modalEmail = document.getElementById("modal-email");

        function openModal(servico) {
            if (servico.contactUrl) {
                window.open(servico.contactUrl, "_blank", "noopener");
                return;
            }
            modalServico.textContent = servico.titulo;
            modalEmail.textContent = REDE_EMAIL;
            modal.classList.add("on");
        }

        function closeModal() {
            modal.classList.remove("on");
        }

        modal.addEventListener("click", e => {
            if (e.target === modal || e.target.classList.contains("modal-close")) {
                closeModal();
            }
        });
        document.addEventListener("keydown", e => {
            if (e.key === "Escape") closeModal();
        });

        function render() {
            const q = norm(searchEl.value);
            const f = funcSelect.value;
            const r = respSelect.value;

            const filtered = servicos.filter(s => {
                if (f && s.funcao !== f) return false;
                if (r && !s.responsavel.some(x => x.handle === r)) return false;
                if (q) {
                    const hay = norm(s.titulo + " " + s.responsavel.map(x => x.nome).join(" ") + " " + s.funcao);
                    if (!hay.includes(q)) return false;
                }
                return true;
            });

            countEl.textContent = `${filtered.length} de ${servicos.length} serviços`;

            if (!filtered.length) {
                listEl.innerHTML = `<li class="empty-state">Nenhum serviço encontrado.</li>`;
                return;
            }

            listEl.innerHTML = "";
            filtered.forEach(s => {
                const li = document.createElement("li");
                const respHtml = s.responsavel.map(r => {
                    const url = r.url || `/${r.handle}/`;
                    const rExt = r.url ? ` target="_blank" rel="noopener"` : "";
                    return `<a href="${esc(url)}"${rExt}>${esc(r.nome)}</a>`;
                }).join(", ");
                const funcaoTag = s.funcao ? `<span class="funcao">${esc(s.funcao)}</span>` : "";
                li.innerHTML = `
                    <div class="servico-titulo">${esc(s.titulo)}</div>
                    <div class="servico-meta">${respHtml}${funcaoTag}</div>
                `;
                li.addEventListener("click", e => {
                    if (e.target.closest("a")) return; // responsible link navigates
                    openModal(s);
                });
                listEl.appendChild(li);
            });
        }

        searchEl.addEventListener("input", render);
        funcSelect.addEventListener("change", render);
        respSelect.addEventListener("change", render);
        render();
    </script>

</body>
</html>
