app = "artelonga-comunicacao"
primary_region = "gru"

[build]

[env]
  SURFACE = "/comunicacao/"   # superfície própria — sem isto o servidor caía no default "/yuri/"
  MODE = "iframe"
  FEEDBACK_UNIVERSE = "comunicacao"
  REDIRECT_URL = "https://yggdrasil.artelonga.com.br/universos/comunicacao"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
