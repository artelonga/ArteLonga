app = "artelonga-yuri"
primary_region = "gru"

[build]

[env]
  SURFACE = "/yuri/"
  FEEDBACK_UNIVERSE = "yuri"
  TELEMETRY_DIR = "/data"
  TELEMETRY_DURABLE = "1"
  SIBLINGS = "https://hostinger.artelonga.com.br"

[[mounts]]
  source = "tele"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
